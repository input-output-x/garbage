# 丢呗 · 极简生产部署（100 人以内够用）
# 用法: cp .env.production.example .env && ./scripts/deploy.sh

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: garbage-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: garbage-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
